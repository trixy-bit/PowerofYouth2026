
[functions.send-otp]
enabled = true
verify_jwt = false
import_map = "./functions/send-otp/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/send-otp/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/send-otp/*.html" ]

[functions.send-ticket]
enabled = true
verify_jwt = false
import_map = "./functions/send-ticket/deno.json"
entrypoint = "./functions/send-ticket/index.ts"
